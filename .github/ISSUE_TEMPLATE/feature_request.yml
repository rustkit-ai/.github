name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. Focus on the problem you're trying to solve.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: Describe the friction or limitation you're running into.
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the solution or feature you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches or workarounds you've tried?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help us understand the request.